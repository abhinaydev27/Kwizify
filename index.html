    <title>Kwizer</title>
    <script>
      (function () {
        const redirect = sessionStorage.getItem("kwizer-pages-redirect");
        if (!redirect) return;
        sessionStorage.removeItem("kwizer-pages-redirect");
        const url = new URL(redirect, window.location.origin);
        window.history.replaceState(null, "", url.pathname + url.search + url.hash);
      })();
    </script>
