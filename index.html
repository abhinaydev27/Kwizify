<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#2563eb" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#07111f" />
    <meta
      name="description"
      content="Kwizify is a modern quiz platform with polished UI, progress tracking, and responsive quiz experiences."
    />
    <meta property="og:title" content="Kwizify" />
    <meta
      property="og:description"
      content="A modern quiz platform with timed quizzes, answer review, score tracking, and polished UI."
    />
    <link rel="canonical" href="https://abhinaydev27.github.io/Kwizify/" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://abhinaydev27.github.io/Kwizify/og-cover.png" />
    <meta property="og:url" content="https://abhinaydev27.github.io/Kwizify/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kwizify" />
    <meta
      name="twitter:description"
      content="A modern quiz platform with timed quizzes, answer review, score tracking, and polished UI."
    />
    <meta name="twitter:image" content="https://abhinaydev27.github.io/Kwizify/og-cover.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Kwizify</title>
    <style>
      .boot-fallback {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f3f7fc;
        color: #0f172a;
        font-family: Inter, system-ui, sans-serif;
      }
      .boot-card {
        width: min(440px, calc(100vw - 32px));
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 18px 50px rgba(15, 23, 42, 0.12);
        padding: 24px;
        text-align: center;
      }
      .boot-spinner {
        width: 42px;
        height: 42px;
        margin: 0 auto 16px;
        border-radius: 999px;
        border: 4px solid rgba(37, 99, 235, 0.15);
        border-top-color: #2563eb;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <script>
      (function () {
        const redirect = sessionStorage.getItem("kwizify-pages-redirect");
        if (!redirect) return;
        sessionStorage.removeItem("kwizify-pages-redirect");
        const url = new URL(redirect, window.location.origin);
        window.history.replaceState(null, "", url.pathname + url.search + url.hash);
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div class="boot-fallback">
        <div class="boot-card">
          <div class="boot-spinner"></div>
          <h1>Loading Kwizify</h1>
          <p>Please wait while the app starts.</p>
        </div>
      </div>
    </div>
    <noscript>
      <div class="boot-fallback">
        <div class="boot-card">
          <h1>JavaScript Required</h1>
          <p>Kwizify needs JavaScript enabled to run the quiz app.</p>
        </div>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
